<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — Tesouraria INJ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { background: #0f2744; font-family: 'Inter', sans-serif; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 20px; padding: 48px 40px;
                  width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .logo-circle { width:72px; height:72px; background:#1a3a5c; border-radius:50%;
                   display:flex; align-items:center; justify-content:center;
                   margin:0 auto 20px; font-size:32px; color:#fff; }
    .title { font-size:1.5rem; font-weight:700; color:#1a3a5c; text-align:center; }
    .subtitle { color:#7f8c9a; text-align:center; font-size:0.85rem; margin-bottom:32px; }
    .form-control { border-radius:10px; padding:12px 14px; border:1px solid #dde2ea; }
    .form-control:focus { border-color:#2980b9; box-shadow:0 0 0 3px rgba(41,128,185,.12); }
    .btn-login { background:#1a3a5c; color:#fff; border:none; border-radius:10px;
                 padding:12px; font-weight:600; width:100%; font-size:1rem; transition:.2s; }
    .btn-login:hover { background:#2980b9; color:#fff; }
    .form-label { font-size:0.82rem; font-weight:600; color:#5d6d7e; }
    .footer-text { text-align:center; font-size:0.75rem; color:#aab; margin-top:24px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo-circle"><i class="bi bi-bank2"></i></div>
  <div class="title">Tesouraria INJ</div>
  <div class="subtitle">Sistema de Gestão Financeira<br>Igreja do Nome de Jesus</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:.85rem">
          <i class="bi bi-exclamation-circle me-1"></i>{{ msg }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <div class="input-group">
        <span class="input-group-text" style="border-radius:10px 0 0 10px">
          <i class="bi bi-person text-muted"></i>
        </span>
        <input type="text" name="usuario" class="form-control" style="border-radius:0 10px 10px 0"
               placeholder="Seu usuário" required autofocus/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <span class="input-group-text" style="border-radius:10px 0 0 10px">
          <i class="bi bi-lock text-muted"></i>
        </span>
        <input type="password" name="senha" class="form-control" style="border-radius:0 10px 10px 0"
               placeholder="Sua senha" required/>
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
    </button>
  </form>

  <div class="footer-text">
    Sem acesso? Fale com o administrador do sistema.
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
